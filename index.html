<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Year With You ❤️</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2f1f,#1e4d2b);
margin:0;
padding:0;
color:#f5f5f5;
overflow:hidden;
}

/* CONTAINER */
.container{
width:100%;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
box-sizing:border-box;
text-align:center;
}

/* FADE IN */
.fade{
animation:fadeIn 0.8s ease;
}
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* PARTICLES */
.particle{
position:fixed;
width:6px;
height:6px;
background:#ff6fa5;
border-radius:50%;
opacity:0.6;
animation:floatUp linear infinite;
}
@keyframes floatUp{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* CARD */
.card{
background:#1a3b2a;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
margin-top:15px;
width:100%;
max-width:500px;
}

/* INPUT */
input{
padding:14px;
font-size:16px;
border-radius:8px;
border:none;
width:100%;
margin-top:10px;
}

/* BUTTON */
button{
background:#e91e63;
color:white;
border:none;
padding:14px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
width:100%;
}
button:hover{background:#ff4081;}
button:active{transform:scale(0.95);}

/* PROGRESS */
.progress{
width:100%;
max-width:500px;
background:#1a3b2a;
border-radius:20px;
overflow:hidden;
margin-bottom:10px;
}
.bar{
height:20px;
width:0%;
background:linear-gradient(90deg,#ff6fa5,#ff4081);
transition:0.5s;
}

/* HIDDEN */
.hidden{display:none;}

/* FINAL GLOW */
#finalScreen{
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{box-shadow:0 0 20px rgba(255,105,180,0.4);}
to{box-shadow:0 0 50px rgba(255,105,180,0.8);}
}

</style>
</head>

<body>

<div class="container">

<h1>1 Year With You ❤️</h1>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<p id="progressText">0% complete</p>

<!-- START -->
<div id="startScreen" class="card fade">
<h2>Enter Password</h2>
<input id="startPassword">
<button onclick="checkStart()">Start</button>
</div>

<!-- GAME -->
<div id="gameArea" class="hidden">

<div class="card fade">
<h2 id="clueText"></h2>
</div>

<div class="card fade">
<p>Enter the password from the envelope:</p>
<input id="passwordInput">
<button onclick="checkPassword()">Next</button>
</div>

</div>

<!-- FINAL -->
<div id="finalScreen" class="hidden card fade">
<h2>You made it ❤️</h2>
<p>Follow the lights… your final surprise is waiting 🌙</p>
</div>

</div>

<script>

/* PARTICLES */
for(let i=0;i<25;i++){
let p=document.createElement("div")
p.className="particle"
p.style.left=Math.random()*100+"vw"
p.style.animationDuration=(5+Math.random()*10)+"s"
document.body.appendChild(p)
}

/* START PASSWORD */
const startPassword = "crazysams"

/* STEPS */
const steps = [

{clue:"Where water met us for the very first time 🌊", password:"firstswim"},
{clue:"Back to the place of chaos and fun 😏", password:"04/04/25"},
{clue:"A place of salt, but not the ocean 🌿", password:"29/03/25"},
{clue:"Where something small meant everything ❤️", password:"firsthug"},
{clue:"Where music moved us together 💃", password:"firstdance"},
{clue:"Where laughter met the sky 😄", password:"playground"},
{clue:"Where adventure sits parked 🚗", password:"jimny"},
{clue:"A place that holds what we built 🛠️", password:"shed"},
{clue:"Where the sunrise began a new chapter 🌅", password:"newyearsunrise"},
{clue:"Safety first… but love always comes first 🧰", password:"emergencykit"},
{clue:"One more stop before the end 🎲", password:"uno"},
{clue:"Your final step awaits… ❤️", password:"final"} // last given by you
]

let step = 0

function checkStart(){
let val = document.getElementById("startPassword").value.toLowerCase()
if(val===startPassword){
document.getElementById("startScreen").classList.add("hidden")
document.getElementById("gameArea").classList.remove("hidden")
loadStep()
updateProgress()
}else{
alert("Try again ❤️")
}
}

function loadStep(){
document.getElementById("passwordInput").value=""
document.getElementById("clueText").innerText = steps[step].clue
}

function checkPassword(){
let val = document.getElementById("passwordInput").value.toLowerCase()

if(val === steps[step].password){
step++

updateProgress()

if(step >= steps.length){
document.getElementById("gameArea").classList.add("hidden")
document.getElementById("finalScreen").classList.remove("hidden")
}else{
loadStep()
}
}else{
alert("Try again ❤️")
}
}

function updateProgress(){
let percent = Math.floor((step/steps.length)*100)
document.getElementById("progressBar").style.width = percent + "%"
document.getElementById("progressText").innerText = percent + "% complete"
}

</script>

</body>
</html>
