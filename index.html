<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Year ❤️</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f2f1f;
color:white;
text-align:center;
}

.hidden{display:none;}

.container{
padding:20px;
max-width:400px;
margin:auto;
}

.card{
background:#1a3b2a;
padding:20px;
border-radius:12px;
margin-top:15px;
}

input,button{
width:100%;
padding:15px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
background:#e91e63;
color:white;
}

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h2>Before tonight ends… ❤️</h2>
<button onclick="start()">Start</button>
</div>

<div class="container">

<div id="startScreen" class="card">
<h3>Enter Password</h3>
<input id="startPass">
<button onclick="checkStart()">Start</button>
</div>

<div id="game" class="hidden">
<div class="card">
<h3 id="clue"></h3>
</div>

<div class="card">
<input id="pass">
<button onclick="check()">Next</button>
</div>
</div>

<div id="pause" class="hidden card">
<h3>You’ve made it ❤️</h3>
<button onclick="unlock()">Continue</button>

<div id="finalUnlock" class="hidden">
<input id="finalPass">
<button onclick="final()">Unlock</button>
</div>
</div>

<div id="cinematic" class="hidden">
<h2 id="text"></h2>
<div id="location" class="hidden">
<h3>Follow the lights ✨</h3>
<button onclick="maps()">Navigate</button>
</div>
</div>

</div>

<script>

const startPassword="crazy sams"
const finalPassword="tonight"

const steps=[
{clue:"Think back to a moment where everything felt simple… where the water touched us and time slowed down. Go to the place where we first shared that feeling", password:"april4th"},
{clue:"Not our first hello, but definitely not our last moment together either. Find the place where we stopped talking and did something better", password:"march29th"},
{clue:"The weather wasn't kind, but we didn't care. Find where that day became ours", password:"watch this"},
{clue:"Not a kiss, not a date just a moment where distance disappeared. Find where we first reached for each other", password:"mine its mine"},
{clue:"No music, no crowd.. just us. go to where we first danced together", password:"play ground"},
{clue:"A lookout with a name that makes you smile, and a day filled with surprises. Find where your birthday gifts were waiting", password:"moon and back"},
{clue:"Something small was changed, so something big could happen. Your next clue is waiting in something that takes you everywhere", password:"Dabo"},
{clue:"Not something we found..but something we made. Go to where our hard work still stands", password:"tomatoes"},
{clue:"Before the world woke up, we were already there.. watching something new begin together", password:"us"},
{clue:"Not the best weather, but definitely one of the best moments.. Where cards were played and laughter won", password:"uno"},
{clue:"Not everything can be solved with thinking.. some things are felt instead. You already know what unlocks this one", password:"08111998"}
]

let step=0

function start(){
document.getElementById("intro").style.display="none"
}

function checkStart(){
if(startPass.value.toLowerCase()===startPassword){
startScreen.classList.add("hidden")
game.classList.remove("hidden")
load()
}else{
alert("Try again ❤️")
}
}

function load(){
clue.innerText=steps[step].clue
}

function check(){
if(pass.value.toLowerCase()===steps[step].password){

step++

if(step===steps.length){
game.classList.add("hidden")
pause.classList.remove("hidden")
return
}

load()

}else{
alert("Try again ❤️")
}
}

function unlock(){
finalUnlock.classList.remove("hidden")
}

function final(){
if(finalPass.value.toLowerCase()===finalPassword){
pause.classList.add("hidden")
cinematic.classList.remove("hidden")
run()
}else{
alert("Not yet ❤️")
}
}

function run(){
const lines=["One last thing…","Everything led to this moment…","Come find me ❤️"]
let i=0

function next(){
if(i<lines.length){
text.innerText=lines[i]
i++
setTimeout(next,2000)
}else{
location.classList.remove("hidden")
}
}

next()
}

function maps(){
window.open("https://www.google.com/maps/search/?api=1&query=Safety%20Beach%20NSW")
}

</script>

</body>
</html>
