<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Year With You ❤️</title>

<style>
body{
font-family:-apple-system, Arial;
background:linear-gradient(135deg,#0f2f1f,#1e4d2b);
margin:0;
color:#f5f5f5;
}

/* INTRO */
#introScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
url('intro.jpg');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
text-align:center;
padding:20px;
}

.hidden{display:none;}

.wrapper{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:420px;
text-align:center;
}

.card{
background:#1a3b2a;
padding:20px;
border-radius:18px;
margin-top:15px;
}

input{
padding:16px;
border-radius:12px;
border:none;
width:100%;
margin-top:10px;
}

button{
background:#e91e63;
color:white;
border:none;
padding:16px;
border-radius:12px;
margin-top:10px;
width:100%;
}

/* CINEMATIC */
#cinematicScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
z-index:20;
}

#cinematicText{
font-size:20px;
opacity:0;
transition:1s;
}

#finalLocation{
display:none;
margin-top:20px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="introScreen">
<div>
<h2>
Before tonight ends…<br><br>
I want you to relive us ❤️
</h2>
<button onclick="startApp()">Start ❤️</button>
</div>
</div>

<div class="wrapper">
<div class="container">

<button onclick="resetApp()" style="background:#444;">Reset</button>

<div id="startScreen" class="card">
<h2>Enter Password</h2>
<input id="startPassword">
<button onclick="checkStart()">Start</button>
</div>

<div id="gameArea" class="hidden">
<div class="card">
<h2 id="clueText"></h2>
</div>

<div class="card">
<input id="passwordInput">
<button onclick="checkPassword()">Next</button>
</div>
</div>

<div id="pauseScreen" class="hidden card">
<h2>You’ve made it this far ❤️</h2>
<button onclick="showFinalUnlock()">Continue</button>

<div id="finalUnlock" class="hidden">
<input id="finalInput">
<button onclick="checkFinal()">Unlock</button>
</div>
</div>

<div id="cinematicScreen" class="hidden">
<div>
<h2 id="cinematicText"></h2>

<div id="finalLocation">
<h3>Follow the lights ✨</h3>
<button onclick="openMaps()">Navigate 📍</button>
</div>
</div>
</div>

</div>
</div>

<script>

/* SAFE START */
window.onload = function(){

const seen = localStorage.getItem("introSeen")
if(seen === "true"){
document.getElementById("introScreen").style.display = "none"
}

}

/* INTRO */
function startApp(){
localStorage.setItem("introSeen","true")
document.getElementById("introScreen").style.display="none"
}

/* GAME */
const startPassword="crazy sams"
const finalPassword="tonight"

const steps=[
{clue:"Think back to a moment where everything felt simple… where the water touched us and time slowed down. Go to the place where we first shared that feeling", password:"april4th"},
{clue:"Not our first hello, but definitely not our last moment together either. Find the place where we stopped talking and did something better", password:"march29th"},
{clue:"The weather wasn't kind, but we didn't care. Find where that day became ours", password:"watch this"},
{clue:"Not a kiss, not a date just a moment where distance disappeared. Find where we first reached for each other", password:"mine its mine"},
{clue:"No music, no crowd.. just us. go to where we first danced together", password:"play ground"},
{clue:"A lookout with a name that makes you smile, and a day filled with surprises. Find where your birthday gifts were waiting", password:"moon and back"},
{clue:"Something small was changed, so something big could happen. Your next clue is waiting in something that takes you everywhere", password:"Dabo"},
{clue:"Not something we found..but something we made. Go to where our hard work still stands", password:"tomatoes"},
{clue:"Before the world woke up, we were already there.. watching something new begin together", password:"us"},
{clue:"Not the best weather, but definitely one of the best moments.. Where cards were played and laughter won", password:"uno"},
{clue:"Not everything can be solved with thinking.. some things are felt instead. You already know what unlocks this one", password:"08111998"}
]

let step=0

function checkStart(){
if(document.getElementById("startPassword").value.toLowerCase()===startPassword){
document.getElementById("startScreen").classList.add("hidden")
document.getElementById("gameArea").classList.remove("hidden")
loadStep()
}else{
alert("Try again ❤️")
}
}

function loadStep(){
document.getElementById("clueText").innerText=steps[step].clue
}

function checkPassword(){
if(document.getElementById("passwordInput").value.toLowerCase()===steps[step].password){

step++

if(step===steps.length){
document.getElementById("gameArea").classList.add("hidden")
document.getElementById("pauseScreen").classList.remove("hidden")
return
}

loadStep()

}else{
alert("Try again ❤️")
}
}

/* FINAL */
function showFinalUnlock(){
document.getElementById("finalUnlock").classList.remove("hidden")
}

function checkFinal(){
if(document.getElementById("finalInput").value.toLowerCase()===finalPassword){
document.getElementById("pauseScreen").classList.add("hidden")
document.getElementById("cinematicScreen").classList.remove("hidden")
runCinematic()
}else{
alert("Not yet ❤️")
}
}

/* CINEMATIC */
function runCinematic(){
const text=document.getElementById("cinematicText")
const lines=["One last thing…","Everything led to this moment…","Come find me ❤️"]

let i=0

function next(){
if(i<lines.length){
text.style.opacity=0
setTimeout(()=>{
text.innerText=lines[i]
text.style.opacity=1
i++
setTimeout(next,2500)
},500)
}else{
document.getElementById("finalLocation").style.display="block"
}
}

next()
}

function openMaps(){
window.open("https://www.google.com/maps/search/?api=1&query=Safety%20Beach%20NSW")
}

function resetApp(){
localStorage.clear()
location.reload()
}

</script>

</body>
</html>
