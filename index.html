<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>1 Year With You ❤️</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2f1f,#1e4d2b);
text-align:center;
margin:0;
padding:0;
color:#f5f5f5;
overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at 30% 30%, rgba(255,105,180,0.1), transparent);
animation:moveGlow 10s infinite alternate;
z-index:-1;
}

@keyframes moveGlow{
0%{transform:translate(0,0);}
100%{transform:translate(-100px,-100px);}
}

/* CONTAINER */
.container{
padding:40px;
max-width:700px;
margin:auto;
}

/* TITLE */
h1{
color:#ff6fa5;
}

/* CARDS */
.card{
background:#1a3b2a;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
margin-top:20px;
transition:0.4s;
}

/* INPUT */
input{
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
width:80%;
max-width:300px;
margin-top:10px;
}

/* BUTTON */
button{
background:#e91e63;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
transition:0.2s;
}

button:active{
transform:scale(0.95);
}

button:hover{
background:#ff4081;
transform:scale(1.05);
}

/* PROGRESS BAR */
.progress{
width:100%;
background:#1a3b2a;
border-radius:20px;
overflow:hidden;
margin:20px 0;
}

.bar{
height:20px;
width:0%;
background:linear-gradient(90deg,#ff6fa5,#ff4081);
box-shadow:0 0 15px #ff6fa5;
transition:0.6s;
}

.progressText{
margin-top:10px;
font-size:14px;
opacity:0.9;
}

/* FADE */
.fade{
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.hidden{
display:none;
}

/* FINAL SCREEN GLOW */
#finalScreen{
box-shadow:0 0 40px rgba(255,105,180,0.6);
animation:finalGlow 2s infinite alternate;
}

@keyframes finalGlow{
0%{box-shadow:0 0 20px rgba(255,105,180,0.4);}
100%{box-shadow:0 0 50px rgba(255,105,180,0.8);}
}

</style>
</head>

<body>

<div class="container fade">

<h1>1 Year With You ❤️</h1>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div class="progressText" id="progressText">
0% complete • Step 1 of 4
</div>

<!-- START -->
<div id="startScreen" class="card fade">

<h2>Enter Password</h2>
<p>Solve the riddle to begin ❤️</p>

<input id="startPassword">
<br>
<button onclick="checkStart()">Start</button>

</div>

<!-- GAME -->
<div id="gameArea" class="hidden">

<div class="card fade" id="clueCard">
<h2 id="clueText"></h2>
</div>

<div class="card fade">
<p>Enter the password from the envelope:</p>

<input id="passwordInput">
<br>
<button onclick="checkPassword()">Unlock</button>
</div>

<div id="questionArea" class="card hidden fade">

<p id="questionText"></p>

<input id="answerInput">
<br>
<button onclick="checkAnswer()">Continue</button>

</div>

</div>

<!-- FINAL -->
<div id="finalScreen" class="hidden card fade">

<h2>You made it ❤️</h2>

<p>Follow the lights… your final surprise is waiting 🌙</p>

</div>

</div>

<script>

const startPassword = "crazysams"

const steps = [

{
clue:`Where water met us for the very first time,
Where laughter echoed and the sun felt like it was ours.`,
password:"firstswim",
question:"What colour was the sky that day?",
answer:["pink","orange","sunset"]
},

{
clue:`From waves to thrills, we chased the rush,
Where chaos lives and fun never rests.`,
password:"crazysams",
question:"What game did we laugh the most playing?",
answer:["arcade","basketball","racing"]
},

{
clue:`Salt in the air, but not from the sea,
A place we shared something simple, just you and me.`,
password:"seasalt",
question:"What did we eat there?",
answer:["chips","burger","fries"]
},

{
clue:`Not where we met,
Not where we played,
But where something quiet
Meant everything.`,
password:"firsthug",
question:"Who hugged first?",
answer:["me","you"]
}

]

let step = 0

function checkStart(){

let input=document.getElementById("startPassword").value.toLowerCase()

if(input===startPassword){

transitionToGame()

}else{
alert("Not quite… ❤️")
}
}

function transitionToGame(){

fadeOut("startScreen", () => {
document.getElementById("gameArea").classList.remove("hidden")
loadStep()
updateProgress()
})

}

function loadStep(){

fadeElement("clueCard")

document.getElementById("questionArea").classList.add("hidden")
document.getElementById("passwordInput").value=""
document.getElementById("answerInput").value=""

document.getElementById("clueText").innerText=steps[step].clue
}

function checkPassword(){

let input=document.getElementById("passwordInput").value.toLowerCase()

if(input===steps[step].password){

fadeElement("questionArea")
document.getElementById("questionArea").classList.remove("hidden")
document.getElementById("questionText").innerText=steps[step].question

}else{
alert("Wrong password ❤️")
}
}

function checkAnswer(){

let input=document.getElementById("answerInput").value.toLowerCase()

if(steps[step].answer.includes(input)){

step++
updateProgress()

if(step>=steps.length){

fadeOut("gameArea", () => {
document.getElementById("finalScreen").classList.remove("hidden")
})

}else{
loadStep()
}

}else{
alert("Try again ❤️")
}
}

function updateProgress(){

let percent=Math.floor((step/steps.length)*100)

document.getElementById("progressBar").style.width=percent+"%"

document.getElementById("progressText").innerText =
percent + "% complete • Step " + (step+1) + " of " + steps.length

}

/* ANIMATIONS */

function fadeElement(id){
let el=document.getElementById(id)
el.classList.remove("fade")
void el.offsetWidth
el.classList.add("fade")
}

function fadeOut(id, callback){

let el=document.getElementById(id)
let opacity=1

let fade=setInterval(()=>{
opacity-=0.1
el.style.opacity=opacity

if(opacity<=0){
clearInterval(fade)
el.classList.add("hidden")
el.style.opacity=1
callback()
}
},30)

}

</script>

</body>
</html>
