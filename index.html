<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>1 Year With You ❤️</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to bottom right,#0f2f1f,#1e4d2b);
text-align:center;
margin:0;
padding:0;
color:#f5f5f5;
overflow-x:hidden;
}

/* FADE ANIMATION */
.fade{
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.container{
padding:40px;
max-width:700px;
margin:auto;
}

h1{
color:#ff6fa5;
}

/* INPUT + BUTTON IMPROVEMENTS */
input{
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
width:80%;
max-width:300px;
margin-top:10px;
}

button{
background:#e91e63;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
background:#ff4081;
}

/* CARD UI */
.card{
background:#1a3b2a;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
margin-top:20px;
}

/* PROGRESS BAR */
.progress{
width:100%;
background:#1a3b2a;
border-radius:20px;
overflow:hidden;
margin:20px 0;
}

.bar{
height:20px;
width:0%;
background:#ff6fa5;
transition:0.5s;
}

/* HIDDEN */
.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container fade">

<h1>1 Year With You ❤️</h1>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<!-- START SCREEN -->
<div id="startScreen" class="card fade">

<h2>Enter Password</h2>
<p>Solve the riddle to begin ❤️</p>

<input id="startPassword">
<br>
<button onclick="checkStart()">Start</button>

</div>

<!-- GAME -->
<div id="gameArea" class="hidden">

<div class="card fade">
<h2 id="clueText"></h2>
</div>

<div class="card fade">
<p>Enter the password from the envelope:</p>

<input id="passwordInput">
<br>
<button onclick="checkPassword()">Unlock</button>
</div>

<div id="questionArea" class="card hidden fade">

<p id="questionText"></p>

<input id="answerInput">
<br>
<button onclick="checkAnswer()">Continue</button>

</div>

</div>

<!-- FINAL -->
<div id="finalScreen" class="hidden card fade">

<h2>You made it ❤️</h2>

<p>Follow the lights… your final surprise is waiting 🌙</p>

</div>

</div>

<script>

// START PASSWORD
const startPassword = "crazysams"

// STEPS (YOU CAN EXPAND THESE)
const steps = [

{
clue:`Where water met us for the very first time,
Where laughter echoed and the sun felt like it was ours.`,
password:"firstswim",
question:"What colour was the sky that day?",
answer:["pink","orange","sunset"]
},

{
clue:`From waves to thrills, we chased the rush,
Where chaos lives and fun never rests.`,
password:"crazysams",
question:"What game did we laugh the most playing?",
answer:["arcade","basketball","racing"]
},

{
clue:`Salt in the air, but not from the sea,
A place we shared something simple, just you and me.`,
password:"seasalt",
question:"What did we eat there?",
answer:["chips","burger","fries"]
},

{
clue:`Not where we met,
Not where we played,
But where something quiet
Meant everything.`,
password:"firsthug",
question:"Who hugged first?",
answer:["me","you"]
}

]

// GAME STATE
let step = 0

function checkStart(){

let input=document.getElementById("startPassword").value.toLowerCase()

if(input===startPassword){

fadeOut("startScreen", () => {
document.getElementById("gameArea").classList.remove("hidden")
loadStep()
})

}else{

alert("Not quite… ❤️")

}

}

function loadStep(){

document.getElementById("questionArea").classList.add("hidden")
document.getElementById("passwordInput").value=""
document.getElementById("answerInput").value=""

document.getElementById("clueText").innerText=steps[step].clue

}

function checkPassword(){

let input=document.getElementById("passwordInput").value.toLowerCase()

if(input===steps[step].password){

document.getElementById("questionArea").classList.remove("hidden")
document.getElementById("questionText").innerText=steps[step].question

}else{

alert("Wrong password ❤️")

}

}

function checkAnswer(){

let input=document.getElementById("answerInput").value.toLowerCase()

if(steps[step].answer.includes(input)){

step++
updateProgress()

if(step>=steps.length){

fadeOut("gameArea", () => {
document.getElementById("finalScreen").classList.remove("hidden")
})

}else{

loadStep()

}

}else{

alert("Try again ❤️")

}

}

function updateProgress(){

let percent=(step/steps.length)*100
document.getElementById("progressBar").style.width=percent+"%"

}

/* FADE OUT FUNCTION */
function fadeOut(id, callback){

let el = document.getElementById(id)
el.style.opacity = 1

let fade = setInterval(() => {
if(el.style.opacity > 0){
el.style.opacity -= 0.1
}else{
clearInterval(fade)
el.classList.add("hidden")
el.style.opacity = 1
callback()
}
},30)

}

</script>

</body>
</html>
