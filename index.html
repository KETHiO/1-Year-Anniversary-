<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 Year With You ❤️</title>

<style>

body{
font-family:-apple-system, Arial;
background:linear-gradient(135deg,#0f2f1f,#1e4d2b);
margin:0;
color:#f5f5f5;
overflow:hidden;
}

/* PARTICLE LAYER (NEW FIX) */
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

/* CONTAINER */
.container{
position:relative;
z-index:2;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding-top:12vh;
padding-left:5vw;
padding-right:5vw;
text-align:center;
}

/* TITLE */
h1{
font-size:24px;
margin-bottom:2vh;
color:#ff6fa5;
}

/* CARD */
.card{
background:#1a3b2a;
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
margin-top:2vh;
width:100%;
max-width:400px;
}

/* INPUT GROUP (CENTER FIX) */
.inputGroup{
display:flex;
flex-direction:column;
align-items:center;
width:100%;
}

/* INPUT */
input{
padding:14px;
font-size:16px;
border-radius:10px;
border:none;
width:85%;
max-width:280px;
margin-top:1.5vh;
text-align:center;
}

/* BUTTON */
button{
background:#e91e63;
color:white;
border:none;
padding:14px;
font-size:16px;
border-radius:10px;
cursor:pointer;
margin-top:1.5vh;
width:85%;
max-width:280px;
}

/* PROGRESS */
.progress{
width:100%;
max-width:400px;
background:#1a3b2a;
border-radius:20px;
overflow:hidden;
margin-bottom:1.5vh;
}
.bar{
height:16px;
width:0%;
background:linear-gradient(90deg,#ff6fa5,#ff4081);
}

/* PARTICLES */
.particle{
position:absolute;
width:6px;
height:6px;
background:#ff6fa5;
border-radius:50%;
opacity:0.7;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh); opacity:0;}
20%{opacity:0.7;}
100%{transform:translateY(-10vh); opacity:0;}
}

/* CONFETTI */
.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 3s linear forwards;
z-index:5;
}
@keyframes fall{
to{transform:translateY(100vh);}
}

/* FINAL */
#finalScreen{
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{box-shadow:0 0 20px rgba(255,105,180,0.4);}
to{box-shadow:0 0 50px rgba(255,105,180,0.9);}
}

.hidden{display:none;}

#letter{
white-space:pre-line;
margin-top:2vh;
}

</style>
</head>

<body>

<!-- PARTICLES CONTAINER -->
<div id="particles"></div>

<div class="container">

<h1>1 Year With You ❤️</h1>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<p id="progressText">0% complete</p>

<div id="startScreen" class="card">
<h2>Enter Password</h2>

<div class="inputGroup">
<input id="startPassword">
<button onclick="checkStart()">Start</button>
</div>

</div>

<div id="gameArea" class="hidden">

<div class="card">
<h2 id="clueText"></h2>
</div>

<div class="card">
<p>Enter the password from the envelope:</p>

<div class="inputGroup">
<input id="passwordInput">
<button onclick="checkPassword()">Next</button>
</div>

</div>

</div>

<div id="finalScreen" class="hidden card">
<h2>You made it ❤️</h2>
<p>Follow the lights… your final surprise is waiting 🌙</p>

<button onclick="showLetter()">Open your letter ❤️</button>

<div id="letter" class="hidden">
My love,

One year with you has been the most beautiful journey of my life.

I love you ❤️
</div>

</div>

</div>

<audio id="music" loop>
<source src="YOUR-MUSIC.mp3" type="audio/mpeg">
</audio>

<script>

/* PARTICLES FIXED */
const particleContainer = document.getElementById("particles")

for(let i=0;i<40;i++){
let p=document.createElement("div")
p.className="particle"
p.style.left=Math.random()*100+"vw"
p.style.animationDuration=(6+Math.random()*8)+"s"
particleContainer.appendChild(p)
}

/* GAME */
const startPassword="crazysams"

const steps=[
{clue:"Where water met us 🌊", password:"firstswim"},
{clue:"Back to chaos 😏", password:"04/04/25"},
{clue:"Salt but not sea 🌿", password:"29/03/25"},
{clue:"Where it meant everything ❤️", password:"firsthug"},
{clue:"Where we danced 💃", password:"firstdance"},
{clue:"Where laughter lives 😄", password:"playground"},
{clue:"Parked adventure 🚗", password:"jimny"},
{clue:"What we built 🛠️", password:"shed"},
{clue:"Where the year began 🌅", password:"newyearsunrise"},
{clue:"Safety first 🧰", password:"emergencykit"},
{clue:"One last game 🎲", password:"uno"},
{clue:"Final step ❤️", password:"final"}
]

let step=0

function checkStart(){
let val=document.getElementById("startPassword").value.toLowerCase()
if(val===startPassword){
document.getElementById("startScreen").classList.add("hidden")
document.getElementById("gameArea").classList.remove("hidden")
document.getElementById("music").play()
loadStep()
updateProgress()
}else{
alert("Try again ❤️")
}
}

function loadStep(){
document.getElementById("passwordInput").value=""
document.getElementById("clueText").innerText=steps[step].clue
}

function checkPassword(){
let val=document.getElementById("passwordInput").value.toLowerCase()
if(val===steps[step].password){
step++
updateProgress()
if(step>=steps.length){
document.getElementById("gameArea").classList.add("hidden")
document.getElementById("finalScreen").classList.remove("hidden")
launchConfetti()
}else{
loadStep()
}
}else{
alert("Try again ❤️")
}
}

function updateProgress(){
let percent=Math.floor((step/steps.length)*100)
document.getElementById("progressBar").style.width=percent+"%"
document.getElementById("progressText").innerText=percent+"% complete"
}

function launchConfetti(){
for(let i=0;i<50;i++){
let c=document.createElement("div")
c.className="confetti"
c.style.left=Math.random()*100+"vw"
c.style.background=`hsl(${Math.random()*360},100%,50%)`
document.body.appendChild(c)
}
}

function showLetter(){
document.getElementById("letter").classList.remove("hidden")
}

</script>

</body>
</html>
