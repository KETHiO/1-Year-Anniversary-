<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>1 Year With You ❤️</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2f1f,#1e4d2b);
text-align:center;
margin:0;
padding:0;
color:#f5f5f5;
overflow:hidden;
}

/* FLOATING PARTICLES */
.particle{
position:fixed;
width:6px;
height:6px;
background:#ff6fa5;
border-radius:50%;
opacity:0.6;
animation:floatUp linear infinite;
}

@keyframes floatUp{
from{
transform:translateY(100vh);
opacity:0;
}
to{
transform:translateY(-10vh);
opacity:0.8;
}
}

/* BACKGROUND GLOW */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at 30% 30%, rgba(255,105,180,0.15), transparent);
animation:moveGlow 12s infinite alternate;
z-index:-1;
}

@keyframes moveGlow{
0%{transform:translate(0,0);}
100%{transform:translate(-120px,-120px);}
}

.container{
padding:40px;
max-width:700px;
margin:auto;
}

h1{
color:#ff6fa5;
}

.card{
background:#1a3b2a;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
margin-top:20px;
}

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
width:80%;
max-width:300px;
margin-top:10px;
}

button{
background:#e91e63;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
transition:0.2s;
}

button:active{
transform:scale(0.95);
}

button:hover{
background:#ff4081;
transform:scale(1.05);
}

.progress{
width:100%;
background:#1a3b2a;
border-radius:20px;
overflow:hidden;
margin:20px 0;
}

.bar{
height:20px;
width:0%;
background:linear-gradient(90deg,#ff6fa5,#ff4081);
box-shadow:0 0 15px #ff6fa5;
transition:0.6s;
}

.progressText{
margin-top:10px;
font-size:14px;
opacity:0.9;
}

.hidden{
display:none;
}

#finalScreen{
box-shadow:0 0 40px rgba(255,105,180,0.6);
animation:finalGlow 2s infinite alternate;
}

@keyframes finalGlow{
0%{box-shadow:0 0 20px rgba(255,105,180,0.4);}
100%{box-shadow:0 0 50px rgba(255,105,180,0.8);}
}

</style>
</head>

<body>

<div class="container">

<h1>1 Year With You ❤️</h1>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div class="progressText" id="progressText">
0% complete • Step 1 of 4
</div>

<div id="startScreen" class="card">

<h2>Enter Password</h2>
<p>Solve the riddle to begin ❤️</p>

<input id="startPassword">
<br>
<button onclick="checkStart()">Start</button>

</div>

<div id="gameArea" class="hidden">

<div class="card">
<h2 id="clueText"></h2>
</div>

<div class="card">
<p>Enter the password from the envelope:</p>

<input id="passwordInput">
<br>
<button onclick="checkPassword()">Next Clue</button>
</div>

</div>

<div id="finalScreen" class="hidden card">

<h2>You made it ❤️</h2>

<p>Follow the lights… your final surprise is waiting 🌙</p>

</div>

<script>

// PARTICLES
function createParticles(){

for(let i=0;i<25;i++){

let p=document.createElement("div")
p.className="particle"

p.style.left=Math.random()*100+"vw"
p.style.animationDuration=(5+Math.random()*10)+"s"
p.style.opacity=Math.random()

document.body.appendChild(p)
}

}

createParticles()

// GAME LOGIC (UNCHANGED)
const startPassword = "crazysams"

const steps = [

{
clue:`Where water met us for the very first time,
Where laughter echoed and the sun felt like it was ours.`,
password:"firstswim"
},

{
clue:`From waves to thrills, we chased the rush,
Where chaos lives and fun never rests.`,
password:"crazysams"
},

{
clue:`Salt in the air, but not from the sea,
A place we shared something simple, just you and me.`,
password:"seasalt"
},

{
clue:`Not where we met,
Not where we played,
But where something quiet
Meant everything.`,
password:"firsthug"
}

]

let step = 0

function checkStart(){

let input=document.getElementById("startPassword").value.toLowerCase()

if(input===startPassword){

document.getElementById("startScreen").classList.add("hidden")
document.getElementById("gameArea").classList.remove("hidden")

loadStep()
updateProgress()

}else{
alert("Not quite… ❤️")
}

}

function loadStep(){

document.getElementById("passwordInput").value=""
document.getElementById("clueText").innerText=steps[step].clue

}

function checkPassword(){

let input=document.getElementById("passwordInput").value.toLowerCase()

if(input===steps[step].password){

step++
updateProgress()

if(step>=steps.length){

document.getElementById("gameArea").classList.add("hidden")
document.getElementById("finalScreen").classList.remove("hidden")

}else{
loadStep()
}

}else{
alert("Wrong password ❤️")
}

}

function updateProgress(){

let percent=Math.floor((step/steps.length)*100)

document.getElementById("progressBar").style.width=percent+"%"

document.getElementById("progressText").innerText =
percent + "% complete • Step " + (step+1) + " of " + steps.length

}

</script>

</body>
</html>
